<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocabulary Test | IT-Study</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .test-wrap{max-width:720px;margin:0 auto;padding:60px 48px 100px;}
    .test-header{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px 36px;margin-bottom:24px;}
    .test-header h1{font-family:var(--font);font-size:26px;font-weight:800;color:var(--text);margin-bottom:6px;}
    .test-header p{font-size:14px;color:var(--muted);font-weight:300;}
    .test-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:36px;}
    .test-counter{font-size:12px;color:var(--muted);margin-bottom:10px;font-weight:500;letter-spacing:.5px;}
    .progress-bar{width:100%;height:5px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;margin-bottom:24px;}
    .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .4s ease;}
    .q-topic{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
    #question{font-size:20px;font-weight:700;font-family:var(--font);margin-bottom:8px;color:var(--text);line-height:1.4;}
    .q-hint{font-size:13px;color:var(--muted);margin-bottom:22px;font-weight:300;}
    .answers{display:flex;flex-direction:column;gap:10px;}
    .answers button{width:100%;padding:13px 18px;border:1px solid var(--border);border-radius:var(--radius-sm);background:rgba(255,255,255,.04);color:var(--text);font-size:14px;text-align:left;cursor:pointer;font-family:var(--font-body);transition:background var(--ease),border-color var(--ease),transform var(--ease);}
    .answers button:hover:not(:disabled){background:rgba(79,142,247,.12);border-color:var(--accent);transform:translateX(4px);}
    .answers button.correct{background:rgba(34,197,94,.18)!important;border-color:#22c55e!important;color:#86efac!important;}
    .answers button.wrong{background:rgba(239,68,68,.18)!important;border-color:#ef4444!important;color:#fca5a5!important;}
    .answers button:disabled{cursor:not-allowed;}
    #result{margin-top:14px;font-size:14px;font-weight:600;min-height:20px;color:var(--accent2);}
    .result-screen{text-align:center;padding:20px 0;}
    .result-screen h2{font-family:var(--font);font-size:30px;font-weight:800;margin-bottom:10px;color:var(--text);}
    .result-screen .score{font-size:56px;font-weight:800;font-family:var(--font);background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:14px 0;}
    .result-screen p{color:var(--muted);margin-bottom:24px;font-size:15px;}
    .result-btns{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;}
    .restart-btn{padding:12px 26px;border:none;border-radius:99px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:14px;font-weight:600;font-family:var(--font-body);cursor:pointer;transition:transform var(--ease);}
    .restart-btn:hover{transform:translateY(-3px);}
    .back-btn{padding:12px 26px;border:1.5px solid var(--border);border-radius:99px;background:transparent;color:var(--text);font-size:14px;font-weight:600;font-family:var(--font-body);cursor:pointer;}
    .nav-btns{display:flex;justify-content:space-between;align-items:center;margin-top:22px;}
    .nav-btns a{font-size:14px;color:var(--muted);}
    .nav-btns a.next{color:var(--accent2);font-weight:500;}
    @media(max-width:768px){.test-wrap{padding:40px 20px 80px;}}
  </style>
</head>
<body class="theme-1">
<header class="header">
  <div class="logo"><a href="project.html">IT-Study</a></div>
  <nav class="menu">
    <a href="english.html">English</a>
    <a href="vocabulary.html">Vocabulary</a>
    <a href="profile.html" id="userArea">Kirish</a>
  </nav>
</header>

<div class="test-wrap">
  <div class="test-header reveal">
    <p class="s-label">Vocabulary Test</p>
    <h1>📚 Reading & Speaking Vocabulary</h1>
    <p>10 ta savol · Reading va Speaking darslaridan so'zlar · Inglizcha → O'zbekcha</p>
  </div>

  <div class="test-box reveal">
    <p class="test-counter" id="counter">Savol 1 / 10</p>
    <div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
    <div class="q-topic" id="qTopic"></div>
    <div id="question"></div>
    <div class="q-hint" id="qHint"></div>
    <div class="answers">
      <button onclick="ans(0)"></button>
      <button onclick="ans(1)"></button>
      <button onclick="ans(2)"></button>
      <button onclick="ans(3)"></button>
    </div>
    <p id="result"></p>
  </div>

  <div class="nav-btns reveal">
    <a href="vocabulary.html">← Vocabulary sahifasiga</a>
    <a href="tests.html" class="next">Barcha testlar →</a>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
const auth=getAuth(initializeApp({apiKey:"AIzaSyDzd5Mq1ACloUlOtxMzpQ-M6mdzqAVhiBc",authDomain:"it-study-a45fa.firebaseapp.com",projectId:"it-study-a45fa",storageBucket:"it-study-a45fa.firebasestorage.app",messagingSenderId:"973750187023",appId:"1:973750187023:web:c38b839da825ffa0681f7a"}));
const ua=document.getElementById("userArea");
onAuthStateChanged(auth,u=>{if(u){const n=u.displayName||u.email;ua.outerHTML=`<div class="profile-pill" onclick="location.href='profile.html'" style="cursor:pointer"><div class="av">${n[0].toUpperCase()}</div><span>${n}</span></div>`;}else{ua.textContent="Kirish";ua.href="login.html";}});
</script>

<script>
var allQuestions = [
  // Reading
  {topic:"📖 Reading — Sog'lom ovqatlanish", q:"obesity", hint:"Inglizcha so'zni o'zbek tiliga tarjima qiling", o:["semizlik","charchoq","yallig'lanish","me'yor"], a:0},
  {topic:"📖 Reading — Texnologiya", q:"surveillance", hint:"", o:["shaffoflik","kuzatuv","tarafkashlik","innovatsiya"], a:1},
  {topic:"📖 Reading — Ta'lim", q:"curriculum", hint:"", o:["stipendiya","o'quv dasturi","baholash","malaka"], a:1},
  {topic:"📖 Reading — Iqtisodiyot", q:"entrepreneurship", hint:"", o:["globallashuv","bojlar","tadbirkorlik","qashshoqlik"], a:2},
  {topic:"📖 Reading — Ekologiya", q:"deforestation", hint:"", o:["iqlim adolati","o'rmonlarni yo'q qilish","energiya samaradorligi","karbon yutuvchilar"], a:1},
  {topic:"📖 Reading — Ilm-fan", q:"peer review", hint:"", o:["ilmiy savodxonlik","yolg'on ma'lumot","tengdosh ekspertizasi","paradigma o'zgarishi"], a:2},
  {topic:"📖 Reading — Psixologiya", q:"cognitive biases", hint:"", o:["kognitiv tarafkashlik","ruhiy salomatlik","xulqiy iqtisodiyot","hissiy intellekt"], a:0},
  {topic:"📖 Reading — Shahar", q:"smart city", hint:"", o:["infratuzilma","aqlli shahar","yashil hudud","jamoat transporti"], a:1},
  {topic:"📖 Reading — Ovqatlanish", q:"gut microbiome", hint:"", o:["ovqatlanish modeli","uglevodlar","ichak mikrobiomi","ozuqaga boy"], a:2},
  {topic:"📖 Reading — Texnologiya", q:"machine learning", hint:"", o:["neyron tarmoqlar","mashinali o'rganish","kuzatuv","algoritm"], a:1},
  // Speaking
  {topic:"🎤 Speaking — Sport", q:"stamina", hint:"", o:["chidamlilik","jarohat","mashq qilish","intizom"], a:0},
  {topic:"🎤 Speaking — Texnologiya", q:"cybersecurity", hint:"", o:["ekran vaqti","ijtimoiy tarmoq","kiberxavfsizlik","innovatsiya"], a:2},
  {topic:"🎤 Speaking — Ta'lim", q:"peer learning", hint:"", o:["masofaviy o'qish","baholash","tengdoshlardan o'rganish","diplom"], a:2},
  {topic:"🎤 Speaking — Sayohat", q:"itinerary", hint:"", o:["manzil","sayohat rejasi","esdalik","madaniy zarba"], a:1},
  {topic:"🎤 Speaking — Oila", q:"upbringing", hint:"", o:["avlod","an'ana","tarbiya","fidoyilik"], a:2},
  {topic:"🎤 Speaking — Ish", q:"work-life balance", hint:"", o:["mustaqil ishlash","ish va hayot muvozanati","lavozim ko'tarilishi","martaba"], a:1},
  {topic:"🎤 Speaking — Shahar", q:"infrastructure", hint:"", o:["ifloslanish","infratuzilma","ko'chish","shahar atrofi"], a:1},
  {topic:"🎤 Speaking — Do'stlik", q:"empathy", hint:"", o:["sadoqat","ziddiyat","empatiya","ijtimoiy doira"], a:2},
  {topic:"🎤 Speaking — Kitob", q:"documentary", hint:"", o:["janr","syujet","hujjatli film","badiiy adabiyot"], a:2},
  {topic:"🎤 Speaking — Ovqat", q:"flavour", hint:"", o:["retsept","ta'm arom","organik","mahalliy taom"], a:1},
];

var questions = [];
var current = 0, score = 0;
var btns = document.querySelectorAll(".answers button");

function shuffle(arr){ var a=[...arr]; for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

// Pick 10 random questions
questions = shuffle(allQuestions).slice(0, 10);

function load() {
  if(current >= questions.length){ showResult(); return; }
  var q = questions[current];
  document.getElementById("counter").textContent = "Savol " + (current+1) + " / " + questions.length;
  document.getElementById("pFill").style.width = (current / questions.length * 100) + "%";
  document.getElementById("qTopic").textContent = q.topic;
  document.getElementById("question").textContent = '"' + q.q + '" — tarjimasi nima?';
  document.getElementById("qHint").textContent = q.hint || "";
  document.getElementById("result").textContent = "";
  btns.forEach(function(b,i){ b.textContent=q.o[i]; b.className=""; b.disabled=false; });
}

function ans(i) {
  btns.forEach(function(b){ b.disabled=true; });
  var correct = questions[current].a;
  btns[i].classList.add(i===correct ? "correct" : "wrong");
  btns[correct].classList.add("correct");
  document.getElementById("result").textContent = i===correct ? "To'g'ri ✅" : "Xato ❌ — To'g'ri: " + questions[current].o[correct];
  if(i===correct) score++;
  current++;
  setTimeout(load, 1300);
}

function showResult() {
  localStorage.setItem("vocabTestAllScore", score);
  var pct = Math.round(score / questions.length * 100);
  var msg = pct>=90 ? "Ajoyib! 🏆" : pct>=70 ? "Yaxshi! 👍" : pct>=50 ? "O'rtacha 📚" : "Ko'proq o'qing 💪";
  document.querySelector(".test-box").innerHTML =
    '<div class="result-screen">' +
    '<h2>Test tugadi! 🎉</h2>' +
    '<div class="score">' + score + '/10</div>' +
    '<p>' + msg + ' — ' + pct + '% to\'g\'ri</p>' +
    '<div class="result-btns">' +
    '<button class="restart-btn" onclick="location.reload()">🔁 Qayta urinish</button>' +
    '<button class="back-btn" onclick="location.href=\'vocabulary.html\'">📚 Vocabularyga qaytish</button>' +
    '</div></div>';
}

load();
</script>
<script>var ro=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting)e.target.classList.add('visible');});},{threshold:0.1});document.querySelectorAll('.reveal').forEach(function(el){ro.observe(el);});</script>
<script src="theme-switcher.js"></script>
</body>
</html>
