<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passive Voice Test | Grammar | IT-Study</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .test-wrap{max-width:720px;margin:0 auto;padding:60px 48px 100px;}
    .test-header{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px 36px;margin-bottom:24px;}
    .test-header h1{font-family:var(--font);font-size:26px;font-weight:800;color:var(--text);margin-bottom:6px;}
    .test-header p{font-size:14px;color:var(--muted);font-weight:300;}
    .test-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:36px;}
    .test-counter{font-size:12px;color:var(--muted);margin-bottom:10px;font-weight:500;letter-spacing:.5px;}
    .progress-bar{width:100%;height:5px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;margin-bottom:24px;}
    .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#22c55e,#4ade80);border-radius:99px;transition:width .4s ease;}
    #question{font-size:18px;font-weight:500;margin-bottom:22px;line-height:1.6;color:var(--text);}
    #question b{color:var(--accent2);font-weight:700;}
    .answers{display:flex;flex-direction:column;gap:10px;}
    .answers button{width:100%;padding:13px 18px;border:1px solid var(--border);border-radius:var(--radius-sm);background:rgba(255,255,255,.04);color:var(--text);font-size:14px;text-align:left;cursor:pointer;font-family:var(--font-body);transition:background var(--ease),border-color var(--ease),transform var(--ease);}
    .answers button:hover:not(:disabled){background:rgba(34,197,94,.1);border-color:#22c55e;transform:translateX(4px);}
    .answers button.correct{background:rgba(34,197,94,.18)!important;border-color:#22c55e!important;color:#86efac!important;}
    .answers button.wrong{background:rgba(239,68,68,.18)!important;border-color:#ef4444!important;color:#fca5a5!important;}
    .answers button:disabled{cursor:not-allowed;}
    #result{margin-top:14px;font-size:14px;font-weight:600;min-height:20px;color:var(--accent2);}
    .explain-box{margin-top:10px;padding:10px 14px;background:rgba(79,142,247,.07);border:1px solid rgba(79,142,247,.15);border-radius:var(--radius-sm);font-size:13px;color:var(--muted);display:none;}
    .result-screen{text-align:center;padding:20px 0;}
    .result-screen h2{font-family:var(--font);font-size:30px;font-weight:800;margin-bottom:10px;color:var(--text);}
    .result-screen .score{font-size:54px;font-weight:800;font-family:var(--font);background:linear-gradient(90deg,#22c55e,#4ade80);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:14px 0;}
    .result-screen p{color:var(--muted);margin-bottom:24px;font-size:15px;}
    .result-btns{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;}
    .restart-btn{padding:12px 26px;border:none;border-radius:99px;background:linear-gradient(135deg,#22c55e,#4ade80);color:#fff;font-size:14px;font-weight:600;font-family:var(--font-body);cursor:pointer;transition:transform var(--ease);}
    .restart-btn:hover{transform:translateY(-3px);}
    .back-btn{padding:12px 26px;border:1.5px solid var(--border);border-radius:99px;background:transparent;color:var(--text);font-size:14px;font-weight:600;font-family:var(--font-body);cursor:pointer;}
    .nav-btns{display:flex;justify-content:space-between;align-items:center;margin-top:22px;}
    .nav-btns a{font-size:14px;color:var(--muted);}
    .nav-btns a.next{color:var(--accent2);font-weight:500;}
    @media(max-width:768px){.test-wrap{padding:40px 20px 80px;}}
  </style>
</head>
<body class="theme-1">
<header class="header">
  <div class="logo"><a href="project.html">IT-Study</a></div>
  <nav class="menu">
    <a href="english.html">English</a>
    <a href="grammar.html">Grammar</a>
    <a href="profile.html" id="userArea">Kirish</a>
  </nav>
</header>

<div class="test-wrap">
  <div class="test-header reveal">
    <p class="s-label">Grammar Test · 8-mavzu</p>
    <h1>📝 Passive Voice — Test</h1>
    <p>10 ta savol · Har bir savolda 4 ta variant · Xato javobda izoh ko'rsatiladi</p>
  </div>

  <div class="test-box reveal">
    <p class="test-counter" id="counter">Savol 1 / 10</p>
    <div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
    <div id="question"></div>
    <div class="answers">
      <button onclick="ans(0)"></button>
      <button onclick="ans(1)"></button>
      <button onclick="ans(2)"></button>
      <button onclick="ans(3)"></button>
    </div>
    <p id="result"></p>
    <div class="explain-box" id="explainBox"></div>
  </div>

  <div class="nav-btns reveal">
    <a href="grammar.html">← Grammar darsiga qaytish</a>
    <a href="grammar-test-modal-verbs.html" class="next">Modal Verbs →</a>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
const auth=getAuth(initializeApp({apiKey:"AIzaSyDzd5Mq1ACloUlOtxMzpQ-M6mdzqAVhiBc",authDomain:"it-study-a45fa.firebaseapp.com",projectId:"it-study-a45fa",storageBucket:"it-study-a45fa.firebasestorage.app",messagingSenderId:"973750187023",appId:"1:973750187023:web:c38b839da825ffa0681f7a"}));
const ua=document.getElementById("userArea");
onAuthStateChanged(auth,u=>{if(u){const n=u.displayName||u.email;ua.outerHTML=`<div class="profile-pill" onclick="location.href='profile.html'" style="cursor:pointer"><div class="av">${n[0].toUpperCase()}</div><span>${n}</span></div>`;}else{ua.textContent="Kirish";ua.href="login.html";}});
</script>

<script>
var questions=[{"q": "The book ___ written by Tolstoy.", "o": ["is", "was", "has", "were"], "a": 1, "e": "Past Simple Passive: was/were + Past Participle."}, {"q": "English ___ spoken all over the world.", "o": ["is", "was", "has been", "are"], "a": 0, "e": "Present Simple Passive: is/are + Past Participle."}, {"q": "The letter ___ sent yesterday.", "o": ["was", "is", "has been", "were"], "a": 0, "e": "Past Simple Passive (singular): was + p.p."}, {"q": "The windows ___ cleaned every week.", "o": ["is", "was", "are", "were"], "a": 2, "e": "Present Simple Passive (plural): are + p.p."}, {"q": "The project ___ completed by Friday.", "o": ["will be", "would be", "is", "was"], "a": 0, "e": "Future Passive: will be + p.p."}, {"q": "A new hospital ___ being built in our city.", "o": ["is", "was", "has", "were"], "a": 0, "e": "Present Continuous Passive: is/are being + p.p."}, {"q": "The results ___ announced last night.", "o": ["are", "were", "have been", "will be"], "a": 1, "e": "O'tgan vaqt (last night) → Past Simple Passive: were."}, {"q": "The cake ___ made by my mother.", "o": ["is", "was", "has", "were"], "a": 1, "e": "Passive Voice: harakatni kim qilganini 'by' bilan ko'rsatamiz."}, {"q": "All tickets ___ already sold.", "o": ["have been", "has been", "are", "were"], "a": 0, "e": "Present Perfect Passive: have/has been + p.p."}, {"q": "She ___ given a prize for her work.", "o": ["was", "is", "were", "has"], "a": 0, "e": "Bilvosita ob'ekt bilan Passive: She was given a prize."}];
var current=0,score=0;
var btns=document.querySelectorAll(".answers button");
function shuffle(a){var b=[...a];for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
questions=shuffle(questions);
function load(){
  if(current>=questions.length){showResult();return;}
  var q=questions[current];
  document.getElementById("counter").textContent="Savol "+(current+1)+" / "+questions.length;
  document.getElementById("pFill").style.width=(current/questions.length*100)+"%";
  document.getElementById("question").innerHTML=q.q;
  document.getElementById("result").textContent="";
  document.getElementById("explainBox").style.display="none";
  btns.forEach(function(b,i){b.textContent=q.o[i];b.className="";b.disabled=false;});
}
function ans(i){
  btns.forEach(function(b){b.disabled=true;});
  var q=questions[current];
  btns[i].classList.add(i===q.a?"correct":"wrong");
  btns[q.a].classList.add("correct");
  if(i===q.a){score++;document.getElementById("result").textContent="To'g'ri ✅";}
  else{document.getElementById("result").textContent="Xato ❌ — To'g'ri: "+q.o[q.a];}
  if(q.e){var eb=document.getElementById("explainBox");eb.textContent="💡 "+q.e;eb.style.display="block";}
  current++;
  setTimeout(load,1400);
}
function showResult(){
  localStorage.setItem("grammarTestPassiveVoice",score);
  var pct=Math.round(score/questions.length*100);
  var msg=pct>=90?"Ajoyib! 🏆":pct>=70?"Yaxshi! 👍":pct>=50?"O'rtacha 📚":"Ko'proq mashq qiling 💪";
  document.querySelector(".test-box").innerHTML=`
    <div class="result-screen">
      <h2>Test tugadi! 🎉</h2>
      <div class="score">${score}/10</div>
      <p>${msg} — ${pct}% to'g'ri</p>
      <div class="result-btns">
        <button class="restart-btn" onclick="location.reload()">🔁 Qayta urinish</button>
        <button class="back-btn" onclick="location.href='grammar.html'">📖 Grammar darsiga</button>
      </div>
    </div>`;
}
load();
</script>
<script>var ro=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting)e.target.classList.add('visible');});},{threshold:0.1});document.querySelectorAll('.reveal').forEach(function(el){ro.observe(el);});</script>
<script src="theme-switcher.js"></script>
</body>
</html>
